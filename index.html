<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#14081d">
<title>闘札圧倒伝ミミ 〜転生したらバニーガールだった私の外れスキル《ぱにゅぱにゅ》だけがレベルアップな件〜</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="preload-overlay">
  <div class="preload-inner">
    <div class="preload-logo">闘札圧倒伝ミミ</div>
    <div class="preload-sub">— 素材を読み込み中 —</div>
    <div class="preload-bar"><div class="preload-bar-fill" id="preload-fill"></div></div>
    <div class="preload-count"><span id="preload-loaded">0</span> / <span id="preload-total">0</span></div>
    <div class="preload-tip" id="preload-tip">🐰 ぱにゅぱにゅ……</div>
  </div>
</div>
<!-- グローバルなBGM要素（テンプレ外。画面切替でも保持） -->
<audio id="lobby-bgm-audio" loop preload="auto">
  <source src="assets/bgm/lobby.mp3" type="audio/mpeg">
  <source src="assets/bgm/velvet-night-casino.m4a" type="audio/mp4">
</audio>
<audio id="ending-bgm-audio" preload="auto">
  <source src="assets/bgm/ending.m4a" type="audio/mp4">
  <source src="assets/bgm/ending.mp3" type="audio/mpeg">
</audio>

<div id="stage">
  <div id="app"></div>
</div>

<!-- 縦持ち警告：スマホ縦画面で表示 -->
<div id="portrait-warning">
  <div class="portrait-warning-inner">
    <div class="rotate-icon">📱↻</div>
    <div class="portrait-message">
      <h2>横向きでプレイしてください</h2>
      <p>このゲームは横向き画面に最適化されています。<br>
      端末を横にすると、自動的にフルスクリーン表示されます。</p>
      <p class="portrait-tip">💡 画面回転ロックがオンの場合は解除してください</p>
    </div>
  </div>
</div>

<!-- 全画面化ボタン：横向きでフルスクリーン未適用時に表示 -->
<div id="fullscreen-btn-group" hidden>
  <button id="fullscreen-btn" type="button">⛶ タップして全画面で遊ぶ</button>
  <button id="fullscreen-dismiss-btn" type="button" title="このボタンを閉じる">✕</button>
</div>

<!-- 画面テンプレート群 -->
<template id="tpl-title">
  <div class="screen title-screen">

    <!-- タイトル背景画像：assets/backgrounds/title_bg.png を読み込み -->
    <div class="bg-layer bg-title">
      <img
        class="title-bg-img"
        src="assets/backgrounds/title_bg.png"
        alt=""
        onerror="this.style.display='none';"
      >
    </div>

    <div class="title-inner">

      <!-- タイトルロゴ画像：assets/ui/title.png を読み込み -->
      <div class="title-logo-frame">
        <img
          class="title-logo-img"
          src="assets/ui/title.png"
          alt="闘札圧倒伝ミミ"
          onerror="this.style.display='none'; this.closest('.title-logo-frame').classList.add('logo-fallback');"
        >

        <!-- ロゴ画像が読み込めなかった時だけ表示する文字タイトル -->
        <div class="title-logo-fallback">
          <h1 class="game-title">
            <span class="title-line1">闘札圧倒伝ミミ</span>
          </h1>
          <p class="subcopy">転生したらバニーガールだった私の外れスキル《ぱにゅぱにゅ》だけがレベルアップな件</p>
        </div>
      </div>
      <div class="title-buttons" data-bind="titleButtons">
        <button class="btn btn-primary" data-action="start">はじめから</button>
      </div>

      <p class="version-tag">ver 1.0</p>
    </div>
  </div>
</template>

<template id="tpl-lobby">
  <div class="screen lobby-screen">
    <div class="bg-layer bg-lobby"></div>
    <div class="lobby-chandelier"></div>
    <div class="lobby-dust"></div>
    <header class="top-hud lobby-hud">
      <button class="btn btn-ghost" data-action="back-title">← タイトルへ</button>
      <h2 class="lobby-title">✦ ロビー ✦ <span class="lobby-sub">VIP CASINO LOUNGE</span></h2>
      <div class="hud-right">
        <button class="panyu-free-btn" data-action="panyu-free" title="ぱにゅぱにゅで遊ぶ（バトル効果なし）">
          <span class="panyu-free-emoji">🐰</span>
        </button>
        <span class="coin-display">💰 <span data-bind="saveCoins">0</span></span>
        <button class="btn btn-ghost" data-action="reset-save" title="セーブデータをリセット">⟲</button>
      </div>
    </header>
    <main class="lobby-main">
      <aside class="lobby-side">
        <!-- リコ立ち絵：枠なしで背景に立つ -->
        <div class="lobby-rico-standing">
          <img data-bind="lobbyRicoImg" src="assets/characters/rico_default.png" alt="リコ先輩" onerror="window.assetFallback(this,'rico')">
          <button class="lobby-rico-outfit" data-bind="lobbyRicoOutfit" data-action="open-rico-viewer" title="リコ先輩を眺める"></button>
        </div>
        <!-- セリフは独立配置（ボタン前面に） -->
        <div class="lobby-rico-bubble" data-bind="lobbyRicoLine">「ようこそロビーへ。次の卓、選んじゃって」</div>
        <!-- 大きな交換所ボタン -->
        <button class="lobby-shop-btn" data-action="open-shop">
          <span class="lobby-shop-icon">🛍</span>
          <span class="lobby-shop-label">交換所</span>
        </button>
        <!-- 音楽コントロール＋設定ボタン -->
        <div class="lobby-bottom-panel" data-bind="lobbyBottomPanel"></div>
      </aside>
      <section class="lobby-content">
        <div class="lobby-section-label">対戦相手 — Opponents</div>
        <div class="lobby-stage-list" data-bind="stageList"></div>
      </section>
    </main>
  </div>
</template>

<template id="tpl-shop">
  <div class="screen shop-screen">
    <div class="bg-layer bg-stage"></div>
    <header class="top-hud">
      <button class="btn btn-ghost" data-action="back-lobby">← ロビーへ</button>
      <h2>🛍 交換所</h2>
      <span class="coin-display">所持コイン：<span data-bind="saveCoins">0</span></span>
    </header>
    <nav class="shop-tabs">
      <button class="shop-cat-btn active" data-cat="panyu">🐰 ぱにゅ強化</button>
      <button class="shop-cat-btn" data-cat="note">📓 戦術ノート</button>
      <button class="shop-cat-btn" data-cat="skin">🎨 見た目</button>
      <button class="shop-cat-btn" data-cat="stack">💰 チップ拡張</button>
      <button class="shop-cat-btn" data-cat="memory">💫 メモリ</button>
    </nav>
    <main class="shop-main">
      <section class="shop-items" data-bind="shopItems"></section>
      <aside class="shop-comment">
        <div class="character-frame char-grano-shop">
          <img src="assets/characters/grano_default.png" alt="グラーノ" onerror="window.assetFallback(this,'grano')">
        </div>
        <div class="rico-bubble grano-shop-bubble" data-bind="ricoShopComment">「お嬢さん、ようこそ。ふむ……まずはぱにゅぱにゅLv2あたりが、お買い得ですよ」</div>
      </aside>
    </main>
  </div>
</template>

<template id="tpl-battle">
  <div class="screen battle-screen">
    <div class="bg-layer bg-poker"></div>

    <header class="top-hud">
      <button class="btn btn-ghost" data-action="back-lobby">中断</button>
      <span class="hand-info">Hand <span data-bind="handNo">1</span></span>
      <div class="street-tracker" data-bind="streetTracker"></div>
      <span class="opponent-name" data-bind="opponentName">ポルカ</span>
    </header>

    <!-- 裏モード（クリア後限定・解放済みなら表示） -->
    <button class="backdoor-toggle" data-action="toggle-backdoor" data-bind="backdoorBtn" title="裏モード：相手の心理ログを盗み見">✦</button>
    <div class="backdoor-panel" data-bind="backdoorPanel"></div>

    <aside class="left-panel">
      <div class="character-frame char-rico">
        <img src="assets/characters/rico_default.png" alt="リコ先輩" onerror="window.assetFallback(this,'rico')">
      </div>
      <div class="rico-bubble" data-bind="ricoAdvice">「いい？相手の言葉を、まず聞いてみな」</div>
    </aside>

    <section class="center-table">
      <div class="opponent-area">
        <div class="character-frame char-opponent">
          <img data-bind="opponentImg" alt="相手">
        </div>
        <div class="opponent-info">
          <div class="opponent-bet" data-bind="opponentBet"></div>
          <div class="opponent-hand-row">
            <div class="opponent-hand">
              <div class="card card-back"></div>
              <div class="card card-back"></div>
            </div>
            <div class="opp-personality" data-bind="opponentPersonality"></div>
          </div>
          <div class="opponent-speech" data-bind="opponentSpeech"></div>
        </div>
      </div>

      <div class="community-cards" data-bind="communityCards">
        <div class="card empty"></div>
        <div class="card empty"></div>
        <div class="card empty"></div>
        <div class="card empty"></div>
        <div class="card empty"></div>
      </div>

      <div class="bet-unified" data-bind="betUnified"></div>
    </section>

    <aside class="right-panel">
      <div class="zazazo-display">
        <div class="zazazo-label">ミミミゲージ <small>3連勝で相手の性格を読み切る</small></div>
        <div class="zazazo-bar">
          <div class="zazazo-fill" data-bind="zazazoFill"></div>
        </div>
        <div class="zazazo-text" data-bind="zazazoText">無風</div>
      </div>
      <div class="psych-stats" data-bind="psychStats"></div>
      <div class="situation-analysis" data-bind="situationAnalysis"></div>
    </aside>

    <footer class="bottom-bar">
      <div class="mimi-area">
        <div class="character-frame char-mimi">
          <img data-bind="mimiImg" src="assets/characters/mimi_default.png" alt="ミミ" onerror="window.assetFallback(this,'mimi')">
        </div>
      </div>
      <div class="mimi-hand-area">
        <div class="hand-thought-row">
          <div class="hand-stack">
            <div class="hand-label hand-label-hand" data-bind="currentHandName">役：—</div>
            <div class="player-hand" data-bind="playerHand">
              <div class="card empty"></div>
              <div class="card empty"></div>
            </div>
            <div class="hand-label hand-label-panyu">
              <span class="hl-key">ぱにゅ</span>
              <span class="panyu-mark" data-bind="panyuMark">○</span>
            </div>
          </div>
          <div class="mimi-thought-bubble" data-bind="mimiThought">「ふぅ……まずは手札を見てから」</div>
        </div>
      </div>
      <div class="action-area" data-bind="actionArea"></div>
    </footer>
  </div>
</template>

<template id="tpl-psych-modal">
  <div class="modal-overlay battle-modal-overlay">
    <div class="battle-bg"></div>
    <div class="battle-vignette"></div>

    <!-- 右上：ぱにゅぱにゅボタン（モーダル外配置で常時アクセス可能） -->
    <button class="panyu-floating-btn" data-action="use-panyu-sense" data-bind="panyuSenseBtn" type="button">
      <span class="panyu-floating-icon">💖</span>
      <span class="panyu-floating-label">ぱにゅぱにゅ</span>
    </button>

    <!-- 中央：拡大したバトルモーダル -->
    <div class="modal psych-modal">
      <h3 class="psych-title">— 心理バトル —</h3>

      <!-- キャラポートレート行（モーダル内・顔から胸まで） -->
      <div class="battle-portraits">
        <div class="battle-portrait portrait-mimi">
          <img src="assets/characters/mimi_default.png" alt="ミミ" onerror="window.assetFallback(this,'mimi')">
          <div class="portrait-name">ミミ</div>
        </div>
        <div class="battle-portrait portrait-opponent" data-bind="battleOpponentChar"></div>
      </div>

      <div class="psych-cards-row">
        <div class="psych-board-info">
          <div class="psych-board-label">場札</div>
          <div class="psych-board-cards" data-bind="psychBoardCards"></div>
          <div class="psych-pot" title="ポット = このハンドで賭けられたチップの合計">ポット：<span data-bind="psychPot">0</span></div>
        </div>
        <div class="psych-hand-info">
          <div class="psych-hand-label">ミミの手札</div>
          <div class="psych-hand-cards" data-bind="psychHandCards"></div>
        </div>
      </div>
      <div class="psych-situation" data-bind="psychSituation"></div>
      <div class="psych-speech" data-bind="psychSpeech"></div>
      <div class="psych-hint zazazo-hint" data-bind="zazazoHint"></div>
      <div class="psych-choices" data-bind="psychChoices"></div>
    </div>
  </div>
</template>

<template id="tpl-ending">
  <div class="screen ending-screen">
    <div class="ending-stage" id="ending-stage"></div>
  </div>
</template>

<template id="tpl-result">
  <div class="screen result-screen">
    <div class="bg-layer bg-result"></div>
    <div class="result-inner">
      <h2 class="result-title" data-bind="resultTitle">勝利</h2>
      <div class="rank-display">
        <div class="rank-label">評価ランク</div>
        <div class="rank-value" data-bind="rankValue">A</div>
      </div>
      <div class="result-stats">
        <div>獲得コイン：<span data-bind="earnedCoins">0</span></div>
        <div>スコア：<span data-bind="score">0</span></div>
        <div>心理バトル成功数：<span data-bind="psychSuccess">0</span></div>
        <div>最大役：<span data-bind="bestHand">-</span></div>
        <div>ブラフブレイク：<span data-bind="bluffBreak">なし</span></div>
      </div>
      <div class="result-reason" data-bind="resultReason"></div>
      <div class="result-buttons" data-bind="resultButtons">
        <button class="btn btn-primary" data-action="rematch">再戦</button>
        <button class="btn btn-secondary" data-action="back-lobby">ロビーへ</button>
      </div>
    </div>
  </div>
</template>

<script src="game.js"></script>
</body>
</html>
